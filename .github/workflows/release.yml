name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          mkdir -p dist

          bun build src/index.ts --compile --target bun-darwin-arm64 --outfile dist/cookunity
          tar -czf dist/cookunity-macos-arm64.tar.gz -C dist cookunity && rm dist/cookunity

          bun build src/index.ts --compile --target bun-darwin-x64 --outfile dist/cookunity
          tar -czf dist/cookunity-macos-x64.tar.gz -C dist cookunity && rm dist/cookunity

          bun build src/index.ts --compile --target bun-linux-arm64 --outfile dist/cookunity
          tar -czf dist/cookunity-linux-arm64.tar.gz -C dist cookunity && rm dist/cookunity

          bun build src/index.ts --compile --target bun-linux-x64 --outfile dist/cookunity
          tar -czf dist/cookunity-linux-x64.tar.gz -C dist cookunity && rm dist/cookunity

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "macos_arm64=$(sha256sum dist/cookunity-macos-arm64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "macos_x64=$(sha256sum dist/cookunity-macos-x64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256sum dist/cookunity-linux-arm64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_x64=$(sha256sum dist/cookunity-linux-x64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          MACOS_ARM64_SHA: ${{ steps.sha.outputs.macos_arm64 }}
          MACOS_X64_SHA: ${{ steps.sha.outputs.macos_x64 }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/sergiosegrera/homebrew-cookunity.git tap
          cd tap

          cat > Formula/cookunity.rb << EOF
          class Cookunity < Formula
            desc "Unofficial CLI for managing your CookUnity meal subscription"
            homepage "https://github.com/sergiosegrera/cookunity-cli"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/sergiosegrera/cookunity-cli/releases/download/${VERSION}/cookunity-macos-arm64.tar.gz"
                sha256 "${MACOS_ARM64_SHA}"
              else
                url "https://github.com/sergiosegrera/cookunity-cli/releases/download/${VERSION}/cookunity-macos-x64.tar.gz"
                sha256 "${MACOS_X64_SHA}"
              end
            end

            def install
              bin.install "cookunity"
            end

            def caveats
              <<~EOS
                Auth tokens are cached at ~/.cookunity/tokens.json.
                To remove them on uninstall, run:
                  rm -rf ~/.cookunity
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/cookunity --version")
            end
          end
          EOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/cookunity.rb
          git diff --cached --quiet || git commit -m "Update cookunity to ${VERSION}"
          git push
